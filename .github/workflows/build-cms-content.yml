name: Build CMS content

on:
  push:
    paths:
      - "cases/**"
      - "themes/**"
      - "images/*.jpg"
      - "images/*.jpeg"
      - "images/*.png"
      - "scripts/build-content.mjs"

permissions:
  contents: write

concurrency:
  group: cms-content-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install image tooling
        run: npm install --prefix /tmp/yunmeng-tools sharp@0.34.5 --no-save --no-package-lock

      - name: Build case data and images
        run: NODE_PATH=/tmp/yunmeng-tools/node_modules node scripts/build-content.mjs

      - name: Commit generated content
        run: |
          if git diff --quiet; then
            echo "Generated content is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cases.json data/categories.json images/optimized
          git commit -m "Build CMS content [skip ci]"
          git push
